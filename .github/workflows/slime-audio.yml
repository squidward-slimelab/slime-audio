name: slime-audio

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "apps/SlimeAudio/**"
      - ".github/workflows/slime-audio.yml"
  pull_request:
    paths:
      - "apps/SlimeAudio/**"
      - ".github/workflows/slime-audio.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore apps/SlimeAudio/SlimeAudio.sln
      - run: dotnet test apps/SlimeAudio/SlimeAudio.sln -c Release --no-restore
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Tray/SlimeAudio.Tray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o artifacts/slime-audio-tray-win-x64
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Send/SlimeAudio.Send.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o artifacts/slime-audio-send-win-x64
      - uses: actions/upload-artifact@v4
        with:
          name: slime-audio-win-x64
          path: artifacts/**
