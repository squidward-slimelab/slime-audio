name: slime-audio

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "apps/SlimeAudio/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/slime-audio.yml"
  pull_request:
    paths:
      - "apps/SlimeAudio/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/slime-audio.yml"
  workflow_dispatch:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python
        run: python -m compileall scripts src tests
      - name: Install Python package
        run: python -m pip install -e .
      - name: Run Python tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build Linux headless receiver
        run: dotnet build apps/SlimeAudio/src/SlimeAudio.Headless/SlimeAudio.Headless.csproj -c Release
      - name: Run protocol tests
        run: dotnet test apps/SlimeAudio/tests/SlimeAudio.Protocol.Tests/SlimeAudio.Protocol.Tests.csproj -c Release --no-restore

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore apps/SlimeAudio/SlimeAudio.sln
      - run: dotnet test apps/SlimeAudio/SlimeAudio.sln -c Release --no-restore
      - name: Compute version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ($version -eq "main") {
            $version = "0.0.0+${{ github.sha }}"
          }
          "SLIME_AUDIO_VERSION=$version" >> $env:GITHUB_ENV
          "SLIME_AUDIO_ASSEMBLY_VERSION=$($version.Split('+')[0])" >> $env:GITHUB_ENV
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Tray/SlimeAudio.Tray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=$env:SLIME_AUDIO_ASSEMBLY_VERSION -p:InformationalVersion=$env:SLIME_AUDIO_VERSION -p:IncludeSourceRevisionInInformationalVersion=false -o artifacts/slime-audio-tray-win-x64
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Send/SlimeAudio.Send.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=$env:SLIME_AUDIO_ASSEMBLY_VERSION -p:InformationalVersion=$env:SLIME_AUDIO_VERSION -p:IncludeSourceRevisionInInformationalVersion=false -o artifacts/slime-audio-send-win-x64
      - run: choco install ffmpeg --no-progress -y
      - name: Bundle snapclient
        shell: pwsh
        run: |
          $snapVersion = "v0.35.0"
          $zip = "$env:RUNNER_TEMP\snapclient_win64.zip"
          $extract = "$env:RUNNER_TEMP\snapclient_win64"
          Invoke-WebRequest "https://github.com/badaix/snapcast/releases/download/$snapVersion/snapclient_win64.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $extract
          Copy-Item "$extract\*" artifacts/slime-audio-tray-win-x64/ -Recurse -Force
          $bundled = Get-Item artifacts/slime-audio-tray-win-x64/snapclient.exe
          if ($bundled.Length -lt 1000000) {
            throw "Bundled snapclient.exe is too small"
          }
      - name: Bundle ffplay
        shell: pwsh
        run: |
          $ffplay = Get-ChildItem "$env:ChocolateyInstall\lib\ffmpeg" -Recurse -Filter ffplay.exe |
            Where-Object { $_.FullName -like "*\tools\ffmpeg\bin\ffplay.exe" } |
            Select-Object -First 1
          if (-not $ffplay) {
            throw "Could not find real ffplay.exe in Chocolatey ffmpeg package"
          }
          Copy-Item $ffplay.FullName artifacts/slime-audio-tray-win-x64/ffplay.exe
          $bundled = Get-Item artifacts/slime-audio-tray-win-x64/ffplay.exe
          if ($bundled.Length -lt 1000000) {
            throw "Bundled ffplay.exe is too small; refusing to ship a Chocolatey shim"
          }
      - run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          iscc apps/SlimeAudio/installer/SlimeAudio.iss
      - uses: actions/upload-artifact@v4
        with:
          name: slime-audio-win-x64
          path: |
            artifacts/installer/SlimeAudioSetup.exe
            artifacts/slime-audio-send-win-x64/SlimeAudio.Send.exe
