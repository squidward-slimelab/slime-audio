name: slime-audio

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "apps/SlimeAudio/**"
      - ".github/workflows/slime-audio.yml"
  pull_request:
    paths:
      - "apps/SlimeAudio/**"
      - ".github/workflows/slime-audio.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore apps/SlimeAudio/SlimeAudio.sln
      - run: dotnet test apps/SlimeAudio/SlimeAudio.sln -c Release --no-restore
      - name: Compute version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if ($version -eq "main") {
            $version = "0.0.0+${{ github.sha }}"
          }
          "SLIME_AUDIO_VERSION=$version" >> $env:GITHUB_ENV
          "SLIME_AUDIO_ASSEMBLY_VERSION=$($version.Split('+')[0])" >> $env:GITHUB_ENV
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Tray/SlimeAudio.Tray.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=$env:SLIME_AUDIO_ASSEMBLY_VERSION -p:InformationalVersion=$env:SLIME_AUDIO_VERSION -o artifacts/slime-audio-tray-win-x64
      - run: dotnet publish apps/SlimeAudio/src/SlimeAudio.Send/SlimeAudio.Send.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:Version=$env:SLIME_AUDIO_ASSEMBLY_VERSION -p:InformationalVersion=$env:SLIME_AUDIO_VERSION -o artifacts/slime-audio-send-win-x64
      - run: choco install innosetup --no-progress -y
      - name: Build installer
        shell: pwsh
        run: |
          iscc apps/SlimeAudio/installer/SlimeAudio.iss
      - uses: actions/upload-artifact@v4
        with:
          name: slime-audio-win-x64
          path: |
            artifacts/installer/SlimeAudioSetup.exe
            artifacts/slime-audio-send-win-x64/SlimeAudio.Send.exe
