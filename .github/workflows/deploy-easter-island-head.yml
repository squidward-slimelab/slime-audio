name: deploy-easter-island-head

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_PATH: /home/squidward/.openclaw/workspace/slime-audio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: easter-island-head-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - easter-island-head
    steps:
      - uses: actions/checkout@v4

      - name: Update deploy checkout
        run: |
          mkdir -p "$DEPLOY_PATH"
          if [[ ! -d "$DEPLOY_PATH/.git" ]]; then
            backup_dir="$(mktemp -d "${RUNNER_TEMP:-/tmp}/slime-audio-deploy-backup.XXXXXX")"
            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 \
              ! -name '.venv' \
              ! -name 'runtime' \
              -exec mv -t "$backup_dir" -- {} +
            git init "$DEPLOY_PATH"
          fi

          git -C "$DEPLOY_PATH" config remote.origin.url \
            "git@github.com:${GITHUB_REPOSITORY}.git" || \
            git -C "$DEPLOY_PATH" remote add origin \
            "git@github.com:${GITHUB_REPOSITORY}.git"
          git config --global --add safe.directory "$DEPLOY_PATH"
          # Fetching the bare push SHA can race GitHub's replication right
          # after a push ("not our ref") — fall back to the branch, which
          # contains the commit by the time the job runs.
          git -C "$DEPLOY_PATH" fetch --prune --tags origin "$GITHUB_SHA" || {
            sleep 5
            git -C "$DEPLOY_PATH" fetch --prune --tags origin "$GITHUB_REF_NAME"
          }
          git -C "$DEPLOY_PATH" checkout -B deploy "$GITHUB_SHA"
          git -C "$DEPLOY_PATH" reset --hard "$GITHUB_SHA"
          git -C "$DEPLOY_PATH" clean -fd -e .venv/ -e runtime/

      - name: Apply deployment
        run: |
          cd "$DEPLOY_PATH"
          bash scripts/deploy_easter_island_head.sh
