<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SlimeAudio Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="label">SlimeAudio</p>
          <h1 id="now-title">loading session</h1>
          <p id="now-meta" class="subtle">waiting for dashboard state</p>
        </div>
        <div class="transport-strip" aria-label="transport status">
          <div>
            <span class="label">transport</span>
            <strong id="transport-status">loading</strong>
          </div>
          <div>
            <span class="label">playhead</span>
            <strong id="playhead-time">--:--</strong>
          </div>
          <div>
            <span class="label">window</span>
            <strong id="window-time">--:--</strong>
          </div>
          <div>
            <span class="label">updated</span>
            <strong id="updated-time">--</strong>
          </div>
        </div>
      </header>

      <section class="status-grid" aria-label="live status">
        <article class="status-panel status-primary">
          <div class="panel-head">
            <div>
              <p class="label">now</p>
              <h2 id="current-title">nothing active</h2>
            </div>
            <span id="current-state" class="badge">idle</span>
          </div>
          <p id="current-detail" class="detail-line">no current clip</p>
          <div class="progress-track" aria-label="session progress">
            <div id="session-progress"></div>
          </div>
        </article>

        <article class="status-panel">
          <p class="label">next clips</p>
          <div id="next-list" class="compact-list"></div>
        </article>

        <article class="status-panel">
          <p class="label">commentary</p>
          <div id="commentary-list" class="compact-list"></div>
        </article>

        <article class="status-panel">
          <p class="label">health</p>
          <div id="health-list" class="compact-list"></div>
        </article>
      </section>

      <section class="timeline-panel" aria-label="session timeline">
        <div class="timeline-toolbar">
          <div>
            <p class="label">arrangement</p>
            <h2 id="timeline-title">native mix session</h2>
          </div>
          <label class="follow-toggle">
            <input id="follow-playhead" type="checkbox" />
            follow playhead
          </label>
        </div>
        <div id="time-axis" class="time-axis"></div>
        <div id="timeline-scroll" class="timeline-scroll">
          <div id="timeline" class="timeline"></div>
        </div>
      </section>

      <section class="lower-grid">
        <article class="status-panel">
          <p class="label">automation</p>
          <div id="automation-list" class="event-list"></div>
        </article>
        <article class="status-panel">
          <p class="label">session</p>
          <div id="session-summary" class="summary-grid"></div>
        </article>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
